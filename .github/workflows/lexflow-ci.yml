# LexFlow CI Pipeline v2.0 -- Lightweight pre-merge checks
# The REAL build/release pipeline is in lexflow-release.yml (DMG, MSI, MSI Lite, APK).
# This CI only runs quick sanity checks on PRs -- it does NOT block pushes to main.
# Pure ASCII -- no Unicode (GitHub YAML parser compatibility)
name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "assets/**"
      - "scripts/**"

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------
  # 1. FRONTEND -- lint (warnings allowed), build check
  # ---------------------------------------------------------
  frontend:
    name: "Frontend: Lint + Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        run: npm ci && cd client && npm ci --legacy-peer-deps

      - name: ESLint (errors only -- warnings are non-blocking)
        working-directory: client
        run: npx eslint . --quiet

      - name: Vite build (production)
        working-directory: client
        run: npm run build

      - name: Frontend tests (Vitest smoke)
        working-directory: client
        run: npx vitest run

      - name: Rust tests (108 security tests)
        working-directory: src-tauri
        run: cargo test --lib --release

      - name: Rust clippy (zero warnings)
        working-directory: src-tauri
        run: cargo clippy -- -W clippy::all -D warnings

      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Dependency audit (cargo audit)
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --quiet 2>/dev/null || true
          cargo audit --file Cargo.lock 2>&1 || echo "::warning::cargo audit found advisories (non-blocking)"

      - name: Binary leak check (no test strings in release)
        working-directory: src-tauri
        run: |
          cargo build --release --quiet 2>/dev/null || true
          if [ -f target/release/lexflow ] || [ -f target/release/app_lib.dylib ]; then
            BIN=$(find target/release -maxdepth 1 \( -name "lexflow" -o -name "app_lib.dylib" -o -name "lexflow.exe" \) -print -quit)
            if [ -n "$BIN" ]; then
              LEAKS=$(strings "$BIN" 2>/dev/null | grep -ci "test_password\|MARKER\|fixture\|dummy_key" || true)
              if [ "$LEAKS" -gt 0 ]; then
                echo "::error::Found $LEAKS test strings in release binary!"
                exit 1
              fi
              echo "Binary leak check: PASS (0 test strings found)"
            fi
          else
            echo "::notice::Release binary not available for leak check (expected in CI)"
          fi

  # ---------------------------------------------------------
  # 2. VERSION CONSISTENCY -- all manifests must agree
  # ---------------------------------------------------------
  version-check:
    name: "Version: Manifest Consistency"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify version consistency across all manifests
        run: |
          VER_ROOT=$(jq -r .version package.json)
          VER_CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          VER_TAURI=$(jq -r .version src-tauri/tauri.conf.json)
          VER_CLIENT=$(jq -r .version client/package.json)

          echo "==================================="
          echo "  package.json:        $VER_ROOT"
          echo "  Cargo.toml:          $VER_CARGO"
          echo "  tauri.conf.json:     $VER_TAURI"
          echo "  client/package.json: $VER_CLIENT"
          echo "==================================="

          PASS=true
          if [ "$VER_ROOT" != "$VER_CARGO" ]; then echo "MISMATCH: package.json ($VER_ROOT) vs Cargo.toml ($VER_CARGO)"; PASS=false; fi
          if [ "$VER_ROOT" != "$VER_TAURI" ]; then echo "MISMATCH: package.json ($VER_ROOT) vs tauri.conf.json ($VER_TAURI)"; PASS=false; fi
          if [ "$VER_ROOT" != "$VER_CLIENT" ]; then echo "MISMATCH: package.json ($VER_ROOT) vs client/package.json ($VER_CLIENT)"; PASS=false; fi

          if [ "$PASS" = false ]; then
            echo ""
            echo "ERROR: Version mismatch detected!"
            echo "All 4 manifests must declare the same version."
            exit 1
          fi
          echo "All versions match: $VER_ROOT"

  # ---------------------------------------------------------
  # 3. CI GATE -- single status check for branch protection
  # ---------------------------------------------------------
  ci-gate:
    name: "CI Gate"
    needs: [frontend, version-check]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Evaluate results
        run: |
          echo "=== CI Gate Results ==="
          echo "  frontend:      ${{ needs.frontend.result }}"
          echo "  version-check: ${{ needs.version-check.result }}"
          echo "======================="

          if [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "FAIL: Frontend checks failed"
            exit 1
          fi
          if [ "${{ needs.version-check.result }}" != "success" ]; then
            echo "FAIL: Version consistency check failed"
            exit 1
          fi

          echo "CI Gate: PASSED"
