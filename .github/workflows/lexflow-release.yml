# LexFlow Release Pipeline v2.0
# Trigger: push tag v* OR workflow_dispatch

name: LexFlow Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  RUST_BACKTRACE: 1

jobs:

  build-macos:
    name: macOS Universal DMG
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Remove local cargo config
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6
        with:
          workspaces: ./src-tauri -> target
          shared-key: macos-universal

      - name: Install dependencies
        run: npm ci && cd client && npm ci --legacy-peer-deps

      - name: Build macOS DMG
        uses: tauri-apps/tauri-action@42503132eed58b227e498e20a4381e47d0c498f6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LexFlow ${{ github.ref_name }}
          releaseBody: Release LexFlow ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin --bundles dmg

  build-windows:
    name: Windows MSI x64
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Remove local cargo config
        shell: powershell
        run: if (Test-Path "src-tauri/.cargo/config.toml") { Remove-Item "src-tauri/.cargo/config.toml" -Force }

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6
        with:
          workspaces: ./src-tauri -> target
          shared-key: windows-x64

      - name: Install WiX 4
        shell: powershell
        run: dotnet tool install --global wix --version 4.0.5; wix extension add WixToolset.UI.wixext/4.0.5 -g

      - name: Write WebView2 offline config
        shell: powershell
        run: |
          $j = '{"bundle":{"windows":{"webviewInstallMode":{"type":"offlineInstaller","silent":true}}}}'
          $u = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$PWD\src-tauri\tauri.webview2.conf.json", $j, $u)

      - name: Install dependencies
        run: npm ci && cd client && npm ci --legacy-peer-deps

      - name: Build Windows MSI
        uses: tauri-apps/tauri-action@42503132eed58b227e498e20a4381e47d0c498f6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "8"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LexFlow ${{ github.ref_name }}
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc --bundles msi --config src-tauri/tauri.webview2.conf.json

  build-windows-no-webview2:
    name: Windows MSI Lite
    runs-on: windows-latest
    needs: build-windows
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Remove local cargo config
        shell: powershell
        run: if (Test-Path "src-tauri/.cargo/config.toml") { Remove-Item "src-tauri/.cargo/config.toml" -Force }

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6
        with:
          workspaces: ./src-tauri -> target
          shared-key: windows-x64-lite

      - name: Install WiX 4
        shell: powershell
        run: dotnet tool install --global wix --version 4.0.5; wix extension add WixToolset.UI.wixext/4.0.5 -g

      - name: Install dependencies
        run: npm ci && cd client && npm ci --legacy-peer-deps

      - name: Build MSI without WebView2
        shell: powershell
        run: npx tauri build --target x86_64-pc-windows-msvc --bundles msi

      - name: Rename and upload MSI lite
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msiFiles = Get-ChildItem -Recurse -Filter "*.msi" -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi"
          foreach ($msi in $msiFiles) {
            $newName = $msi.Name -replace "\.msi$", "-no-webview2.msi"
            $newPath = Join-Path $msi.DirectoryName $newName
            Rename-Item $msi.FullName $newName
            gh release upload "${{ github.ref_name }}" "$newPath" --clobber
          }

  build-android:
    name: Android APK + AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Remove local cargo config
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Setup Android NDK
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6
        with:
          workspaces: ./src-tauri -> target
          shared-key: android

      - name: Install dependencies
        run: npm ci && cd client && npm ci --legacy-peer-deps

      - name: Initialize Tauri Android
        run: npx tauri android init
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Generate Android icons
        run: python3 scripts/generate-icons.py

      - name: Configure Gradle for CI
        run: |
          {
            echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m"
            echo "org.gradle.daemon=false"
            echo "org.gradle.parallel=true"
            echo "org.gradle.caching=true"
          } >> src-tauri/gen/android/gradle.properties

      - name: Download Gradle with retry
        working-directory: src-tauri/gen/android
        run: |
          for _i in 1 2 3 4 5; do
            ./gradlew --version && break
            sleep 15
          done

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/app/release.keystore
            echo "Keystore decoded"
          else
            echo "No keystore - build will be unsigned"
          fi

      - name: Inject release signing
        run: |
          GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          KS="src-tauri/gen/android/app/release.keystore"
          if [ ! -f "$KS" ] || [ ! -f "$GRADLE" ]; then
            echo "Keystore or Gradle not found, skipping"
            exit 0
          fi
          SIGNING='    signingConfigs {\n        create("release") {\n            storeFile = file("release.keystore")\n            storePassword = System.getenv("ANDROID_STORE_PASSWORD") ?: ""\n            keyAlias = System.getenv("ANDROID_KEY_ALIAS") ?: ""\n            keyPassword = System.getenv("ANDROID_KEY_PASSWORD") ?: ""\n        }\n    }\n'
          sed -i "s|buildTypes {|${SIGNING}\n    buildTypes {|" "$GRADLE"
          sed -i 's|getByName("release") {|getByName("release") {\n                signingConfig = signingConfigs.getByName("release")|' "$GRADLE"
          echo "Gradle signing configured"

      - name: Build Android
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "8"
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npx tauri android build

      - name: Sign APK
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BT=$(ls -d "$ANDROID_HOME/build-tools/"* | sort -V | tail -1)
          APK=$(find src-tauri/gen/android -name "*universal-release.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*release.apk" ! -name "*unsigned*" | head -1)
          fi
          if [ -z "$APK" ]; then echo "::error::No release APK found"; exit 1; fi
          echo "Source APK: $APK"
          ALIGNED="/tmp/lexflow-aligned.apk"
          "$BT/zipalign" -f -p 4 "$APK" "$ALIGNED"
          "$BT/zipalign" -c -p 4 "$ALIGNED"
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [ "$VERSION" = "$TAG" ]; then VERSION="1.0.0"; fi
          FINAL="/tmp/LexFlow-v${VERSION}-universal.apk"
          "$BT/apksigner" sign \
            --ks src-tauri/gen/android/app/release.keystore \
            --ks-pass "env:ANDROID_STORE_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass "env:ANDROID_KEY_PASSWORD" \
            --v1-signing-enabled true --v2-signing-enabled true \
            --v3-signing-enabled true --v4-signing-enabled true \
            --out "$FINAL" "$ALIGNED"
          "$BT/apksigner" verify --verbose "$FINAL"
          echo "APK signed and verified"
          echo "APK_FINAL=$FINAL" >> "$GITHUB_ENV"
          AAB=$(find src-tauri/gen/android -name "*release.aab" 2>/dev/null | head -1)
          if [ -n "$AAB" ]; then
            AAB_FINAL="/tmp/LexFlow-v${VERSION}-universal.aab"
            cp "$AAB" "$AAB_FINAL"
            echo "AAB_FINAL=$AAB_FINAL" >> "$GITHUB_ENV"
          fi

      - name: Upload artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for _i in $(seq 1 30); do
            gh release view "$TAG" > /dev/null 2>&1 && break
            echo "Waiting for release... ($_i/30)"
            sleep 15
          done
          if [ -f "${APK_FINAL:-}" ]; then
            gh release upload "$TAG" "$APK_FINAL" --clobber
            cp "$APK_FINAL" /tmp/app-universal-release.apk
            gh release upload "$TAG" /tmp/app-universal-release.apk --clobber
            echo "APK uploaded"
          fi
          if [ -f "${AAB_FINAL:-}" ]; then
            gh release upload "$TAG" "$AAB_FINAL" --clobber
            cp "$AAB_FINAL" /tmp/app-universal-release.aab
            gh release upload "$TAG" /tmp/app-universal-release.aab --clobber
            echo "AAB uploaded"
          fi
