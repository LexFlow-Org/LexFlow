# LexFlow Release Pipeline v2.1 -- NASA Tier
# Pure ASCII -- no Unicode (GitHub YAML parser compatibility)
name: Release LexFlow - Suite Legale

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  RUST_BACKTRACE: 1
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"

jobs:
  # ---------------------------------------------------------
  # 1. PRE-FLIGHT -- Quality Gate & Release Controller
  # ---------------------------------------------------------
  pre-flight:
    name: "Pre-flight: Quality Gate & Release Draft"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.get_version.outputs.TAG }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy, rustfmt

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: ./src-tauri -> target
          shared-key: preflight

      - name: Remove local cargo config (CI uses default linker)
        run: rm -f src-tauri/.cargo/config.toml

      - name: Install dependencies
        run: npm ci && cd client && npm ci --legacy-peer-deps

      - name: Fetch typst sidecar (Linux)
        run: |
          set -e
          mkdir -p src-tauri/binaries
          # Pre-flight runs on ubuntu (x86_64-unknown-linux-gnu target triple).
          # Typst publishes musl builds only -- download, extract, rename to match Tauri target.
          ASSET="typst-x86_64-unknown-linux-musl.tar.xz"
          TAURI_NAME="typst-x86_64-unknown-linux-gnu"
          OUT="src-tauri/binaries/$TAURI_NAME"
          if [ -f "$OUT" ]; then
            echo "Typst sidecar $OUT already exists"; exit 0
          fi
          URL="https://github.com/typst/typst/releases/latest/download/$ASSET"
          echo "Downloading $URL"
          curl -fSL -o "/tmp/$ASSET" "$URL"
          tar -xJf "/tmp/$ASSET" -C /tmp
          # The archive contains a folder like typst-x86_64-unknown-linux-musl/typst
          EXTRACTED=$(find /tmp -name "typst" -type f -path "*/typst-x86_64*" | head -1)
          if [ -z "$EXTRACTED" ]; then echo "ERROR: typst binary not found in archive"; exit 1; fi
          cp "$EXTRACTED" "$OUT"
          chmod +x "$OUT"
          echo "Typst sidecar ready: $OUT ($(wc -c < "$OUT") bytes)"

      - name: Determine Version Tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="v$(jq -r .version package.json)"
            echo "TAG=$VERSION" >> $GITHUB_OUTPUT
            echo "Workflow dispatch -- tag from package.json: $VERSION"
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "Tag push detected: ${{ github.ref_name }}"
          fi

      - name: Version Validation
        run: |
          TAG="${{ steps.get_version.outputs.TAG }}"
          VER_PKG="v$(jq -r .version package.json)"
          VER_CARGO="v$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          VER_TAURI="v$(jq -r .version src-tauri/tauri.conf.json)"
          VER_CLIENT="v$(jq -r .version client/package.json)"
          echo "Tag:         $TAG"
          echo "package.json:       $VER_PKG"
          echo "Cargo.toml:         $VER_CARGO"
          echo "tauri.conf.json:    $VER_TAURI"
          echo "client/package.json: $VER_CLIENT"
          MISMATCH=0
          if [ "$TAG" != "$VER_PKG" ]; then echo "MISMATCH: tag vs package.json"; MISMATCH=1; fi
          if [ "$TAG" != "$VER_CARGO" ]; then echo "MISMATCH: tag vs Cargo.toml"; MISMATCH=1; fi
          if [ "$TAG" != "$VER_TAURI" ]; then echo "MISMATCH: tag vs tauri.conf.json"; MISMATCH=1; fi
          if [ "$TAG" != "$VER_CLIENT" ]; then echo "MISMATCH: tag vs client/package.json"; MISMATCH=1; fi
          if [ "$MISMATCH" -eq 1 ]; then echo "ERROR: Version mismatch detected. Aborting."; exit 1; fi
          echo "All versions match: $TAG"

      - name: Quality Gate -- cargo check + clippy + fmt
        working-directory: src-tauri
        run: |
          cargo check --release 2>&1
          cargo clippy --release -- -D warnings 2>&1
          cargo fmt --check 2>&1

      - name: Quality Gate -- ESLint
        working-directory: client
        run: npx eslint . --max-warnings 0 || echo "ESLint warnings found (non-blocking)"

      - name: Quality Gate -- Vite build
        working-directory: client
        run: npm run build

      - name: Secret Scanning -- gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Dependency Audit -- cargo audit + npm audit
        run: |
          cargo install cargo-audit --quiet 2>/dev/null || true
          cargo audit --file src-tauri/Cargo.lock 2>&1 || echo "cargo audit: vulnerabilities found (non-blocking)"
          cd client && npm audit --audit-level=high 2>&1 || echo "npm audit: vulnerabilities found (non-blocking)"

      - name: License Check -- cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979
        with:
          manifest-path: src-tauri/Cargo.toml
          command: check
        continue-on-error: true

      - name: Create Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_version.outputs.TAG }}"
          NOTES="Release in progress -- all platform builds running..."
          if [ -f CHANGELOG.md ]; then
            SECTION=$(awk "/^## \[${TAG#v}\]/{found=1;next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
            if [ -n "$SECTION" ]; then
              NOTES="$SECTION"
            fi
          fi
          printf '%s\n' "$NOTES" > /tmp/release-notes.md
          gh release create "$TAG" --draft --title "LexFlow $TAG" --notes-file /tmp/release-notes.md || echo "Release already exists."

  # ---------------------------------------------------------
  # 2. MACOS UNIVERSAL BUILD
  # ---------------------------------------------------------
  build-macos:
    name: "macOS: Universal DMG"
    needs: pre-flight
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ needs.pre-flight.outputs.tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Remove local cargo config (CI uses default linker)
        run: rm -f src-tauri/.cargo/config.toml

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: ./src-tauri -> target
          shared-key: macos-universal

      - name: Install dependencies
        run: npm ci && cd client && npm ci --legacy-peer-deps

      - name: Fetch typst sidecars (macOS universal)
        run: |
          set -e
          mkdir -p src-tauri/binaries
          for ARCH in aarch64 x86_64; do
            ASSET="typst-${ARCH}-apple-darwin.tar.xz"
            TAURI_NAME="typst-${ARCH}-apple-darwin"
            OUT="src-tauri/binaries/$TAURI_NAME"
            if [ -f "$OUT" ]; then
              echo "$TAURI_NAME already exists"; continue
            fi
            URL="https://github.com/typst/typst/releases/latest/download/$ASSET"
            echo "Downloading $URL"
            curl -fSL -o "/tmp/$ASSET" "$URL"
            tar -xJf "/tmp/$ASSET" -C /tmp
            EXTRACTED=$(find /tmp -name "typst" -type f -path "*${ARCH}*" | head -1)
            if [ -z "$EXTRACTED" ]; then echo "ERROR: typst not found in $ASSET"; exit 1; fi
            cp "$EXTRACTED" "$OUT"
            chmod +x "$OUT"
            echo "$TAURI_NAME ready ($(wc -c < "$OUT") bytes)"
            rm -rf /tmp/typst-${ARCH}-apple-darwin*
          done

      - name: Build macOS DMG
        uses: tauri-apps/tauri-action@6a45448f17a006facb105cc5257b3edbc353038a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin --bundles dmg

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11
        with:
          path: ./
          format: cyclonedx-json
          output-file: lexflow-macos-sbom.json

      - name: SHA256 Checksums & Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" lexflow-macos-sbom.json --clobber
          DMG_FILE=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG_FILE" ]; then
            gh release upload "$RELEASE_TAG" "$DMG_FILE" --clobber
            shasum -a 256 "$DMG_FILE" > lexflow-macos.dmg.sha256
            gh release upload "$RELEASE_TAG" lexflow-macos.dmg.sha256 --clobber
          fi

      - name: Attest Build Provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        continue-on-error: true
        with:
          subject-path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ---------------------------------------------------------
  # 3a. WINDOWS MSI LITE -- Standard (no bundled WebView2)
  # ---------------------------------------------------------
  build-windows-lite:
    name: "Windows: MSI Lite (no WebView2)"
    needs: pre-flight
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ needs.pre-flight.outputs.tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: ./src-tauri -> target
          shared-key: windows-lite

      - name: Install WiX 4
        shell: powershell
        run: dotnet tool install --global wix --version 4.0.5; wix extension add WixToolset.UI.wixext/4.0.5 -g

      - name: Install dependencies
        run: npm ci && cd client && npm ci --legacy-peer-deps

      - name: Remove local cargo config (CI uses default linker)
        shell: powershell
        run: Remove-Item -Force -ErrorAction SilentlyContinue src-tauri/.cargo/config.toml

      - name: Fetch typst sidecar (Windows)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          $out = "src-tauri/binaries/typst-x86_64-pc-windows-msvc.exe"
          if (Test-Path $out) { Write-Host "Typst sidecar already exists"; exit 0 }
          $url = "https://github.com/typst/typst/releases/latest/download/typst-x86_64-pc-windows-msvc.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\typst-windows.zip"
          Expand-Archive -Path "$env:TEMP\typst-windows.zip" -DestinationPath "$env:TEMP\typst-win" -Force
          $exe = Get-ChildItem -Recurse -Filter "typst.exe" -Path "$env:TEMP\typst-win" | Select-Object -First 1
          if (-not $exe) { Write-Error "typst.exe not found in archive"; exit 1 }
          Copy-Item $exe.FullName $out
          Write-Host "Typst sidecar ready: $out ($([math]::Round((Get-Item $out).Length / 1MB, 1)) MB)"

      - name: Build Windows MSI (Lite)
        shell: powershell
        run: npx tauri build --target x86_64-pc-windows-msvc --bundles msi

      - name: Stage Lite MSI
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "staging"
          $msi = Get-ChildItem -Recurse -Filter "*.msi" -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi" | Select-Object -First 1
          Copy-Item $msi.FullName "staging/LexFlow-$env:RELEASE_TAG-windows-x64.msi"
          Write-Host "Lite MSI staged: LexFlow-$env:RELEASE_TAG-windows-x64.msi ($([math]::Round($msi.Length / 1MB, 1)) MB)"

      - name: Generate SBOM & SHA256 Checksums & Upload
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file lexflow-windows-lite-sbom.json
          gh release upload "$env:RELEASE_TAG" lexflow-windows-lite-sbom.json --clobber
          Get-ChildItem -Filter "LexFlow-*.msi" -Path "staging" | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ASCII
              gh release upload "$env:RELEASE_TAG" $_.FullName --clobber
              gh release upload "$env:RELEASE_TAG" "$($_.FullName).sha256" --clobber
          }

      - name: Attest Build Provenance (SLSA)
        continue-on-error: true          # attestation non disponibile su org private/free
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: staging/LexFlow-*.msi

  # ---------------------------------------------------------
  # 3b. WINDOWS MSI -- Offline WebView2 (bundled installer)
  # ---------------------------------------------------------
  build-windows-offline:
    name: "Windows: MSI Offline WebView2"
    needs: pre-flight
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ needs.pre-flight.outputs.tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: ./src-tauri -> target
          shared-key: windows-offline

      - name: Install WiX 4
        shell: powershell
        run: dotnet tool install --global wix --version 4.0.5; wix extension add WixToolset.UI.wixext/4.0.5 -g

      - name: Install dependencies
        run: npm ci && cd client && npm ci --legacy-peer-deps

      - name: Remove local cargo config (CI uses default linker)
        shell: powershell
        run: Remove-Item -Force -ErrorAction SilentlyContinue src-tauri/.cargo/config.toml

      - name: Fetch typst sidecar (Windows)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          $out = "src-tauri/binaries/typst-x86_64-pc-windows-msvc.exe"
          if (Test-Path $out) { Write-Host "Typst sidecar already exists"; exit 0 }
          $url = "https://github.com/typst/typst/releases/latest/download/typst-x86_64-pc-windows-msvc.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\typst-windows.zip"
          Expand-Archive -Path "$env:TEMP\typst-windows.zip" -DestinationPath "$env:TEMP\typst-win" -Force
          $exe = Get-ChildItem -Recurse -Filter "typst.exe" -Path "$env:TEMP\typst-win" | Select-Object -First 1
          if (-not $exe) { Write-Error "typst.exe not found in archive"; exit 1 }
          Copy-Item $exe.FullName $out
          Write-Host "Typst sidecar ready: $out ($([math]::Round((Get-Item $out).Length / 1MB, 1)) MB)"

      - name: Write WebView2 offline config
        shell: powershell
        run: |
          $j = '{"bundle":{"windows":{"webviewInstallMode":{"type":"offlineInstaller","silent":true}}}}'
          $u = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$PWD\src-tauri\tauri.webview2.conf.json", $j, $u)

      - name: Build Windows MSI (Offline WebView2)
        shell: powershell
        run: npx tauri build --target x86_64-pc-windows-msvc --bundles msi --config src-tauri/tauri.webview2.conf.json

      - name: Stage Offline MSI
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "staging"
          $msi = Get-ChildItem -Recurse -Filter "*.msi" -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "staging/LexFlow-$env:RELEASE_TAG-windows-x64-offline-webview2.msi"
            Write-Host "Offline MSI staged: LexFlow-$env:RELEASE_TAG-windows-x64-offline-webview2.msi ($([math]::Round($msi.Length / 1MB, 1)) MB)"
          } else {
            Write-Error "No MSI found after offline WebView2 build!"
            exit 1
          }

      - name: Generate SBOM & SHA256 Checksums & Upload
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file lexflow-windows-offline-sbom.json
          gh release upload "$env:RELEASE_TAG" lexflow-windows-offline-sbom.json --clobber
          Get-ChildItem -Filter "LexFlow-*.msi" -Path "staging" | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ASCII
              gh release upload "$env:RELEASE_TAG" $_.FullName --clobber
              gh release upload "$env:RELEASE_TAG" "$($_.FullName).sha256" --clobber
          }

      - name: Attest Build Provenance (SLSA)
        continue-on-error: true          # attestation non disponibile su org private/free
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: staging/LexFlow-*.msi

  # ---------------------------------------------------------
  # 4. ANDROID APK + AAB (Secure RAM-Disk Signing)
  # ---------------------------------------------------------
  build-android:
    name: "Android: APK + AAB"
    needs: pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ needs.pre-flight.outputs.tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Setup Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Setup Android NDK
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: ./src-tauri -> target
          shared-key: android

      - name: Install dependencies
        run: |
          npm ci && cd client && npm ci --legacy-peer-deps
          pip3 install Pillow --quiet

      - name: Remove local cargo config (CI safety)
        run: rm -f src-tauri/.cargo/config.toml

      - name: Build Android
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          npx tauri android init
          python3 scripts/generate-icons.py
          npx tauri android build

      - name: Sign APK/AAB (Secure RAM-Disk Mode)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Trap: destroy keystore from RAM on exit (success, error, or cancel)
          trap 'if [ -f /dev/shm/release.keystore ]; then shred -u /dev/shm/release.keystore; echo "Keystore destroyed from RAM."; fi' EXIT
          # Decode keystore to /dev/shm (tmpfs RAM disk -- never touches physical disk)
          echo "$KEYSTORE_BASE64" | base64 -d > /dev/shm/release.keystore
          # Find latest build-tools
          BT=$(ls -d "$ANDROID_HOME/build-tools/"* | sort -V | tail -1)
          # Sign and zipalign APK (env: prevents password from appearing in ps aux)
          APK=$(find src-tauri/gen/android -name "*universal-release*.apk" | head -1)
          echo "Found APK: $APK"
          if [ -z "$APK" ]; then echo "ERROR: No APK found!"; find src-tauri/gen/android -name "*.apk" -o -name "*.aab" | sort; exit 1; fi
          "$BT/zipalign" -f -p 4 "$APK" aligned.apk
          "$BT/apksigner" sign \
            --ks /dev/shm/release.keystore \
            --ks-pass "env:ANDROID_STORE_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass "env:ANDROID_KEY_PASSWORD" \
            --out "LexFlow-${RELEASE_TAG}-android.apk" \
            aligned.apk
          # Copy AAB
          AAB=$(find src-tauri/gen/android -name "*release.aab" | head -1)
          echo "Found AAB: $AAB"
          if [ -z "$AAB" ]; then echo "ERROR: No AAB found!"; exit 1; fi
          cp "$AAB" "LexFlow-${RELEASE_TAG}-android.aab"
          # Cleanup intermediate artifacts
          rm -f aligned.apk
          echo "Signing complete. Trap EXIT will shred keystore automatically."

      - name: SHA256 Checksums & Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in LexFlow-*.apk LexFlow-*.aab; do
            sha256sum "$file" > "$file.sha256"
            gh release upload "$RELEASE_TAG" "$file" --clobber
            gh release upload "$RELEASE_TAG" "$file.sha256" --clobber
          done

      - name: Attest Build Provenance (SLSA)
        continue-on-error: true          # attestation non disponibile su org private/free
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: LexFlow-*.apk

  # ---------------------------------------------------------
  # 5. PUBLISH RELEASE (only if ALL builds succeed)
  # ---------------------------------------------------------
  publish-release:
    name: "Publish Release"
    needs: [pre-flight, build-macos, build-windows-lite, build-windows-offline, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always() && needs.build-macos.result == 'success' && needs.build-windows-lite.result == 'success' && needs.build-windows-offline.result == 'success' && needs.build-android.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Publish Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.pre-flight.outputs.tag }}
        run: |
          TAG="${{ needs.pre-flight.outputs.tag }}"
          if [ -f CHANGELOG.md ]; then
            SECTION=$(awk "/^## \[${TAG#v}\]/{found=1;next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
            if [ -n "$SECTION" ]; then
              printf '%s\n' "$SECTION" > /tmp/release-notes.md
            else
              echo "Release $TAG" > /tmp/release-notes.md
            fi
          else
            echo "Release $TAG" > /tmp/release-notes.md
          fi
          gh release edit "$RELEASE_TAG" --draft=false --notes-file /tmp/release-notes.md
          echo "Release $RELEASE_TAG published successfully!"

  # ---------------------------------------------------------
  # 6. ROLLBACK (if any build fails, delete the draft)
  # ---------------------------------------------------------
  rollback:
    name: "Rollback: Cleanup Failed Release"
    needs: [pre-flight, build-macos, build-windows-lite, build-windows-offline, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always() && (needs.build-macos.result == 'failure' || needs.build-windows-lite.result == 'failure' || needs.build-windows-offline.result == 'failure' || needs.build-android.result == 'failure')
    steps:
      - name: Delete Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.pre-flight.outputs.tag }}
        run: |
          echo "Build failed -- cleaning up draft release $RELEASE_TAG"
          gh release delete "$RELEASE_TAG" --yes 2>/dev/null || echo "No draft to delete."
          echo "Rollback complete. Fix the issue and re-trigger."
