# ═══════════════════════════════════════════════════════════════════════════════
#  LexFlow — Production Release Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Architettura:
#    Job 1:  macOS Universal DMG       (Intel + Apple Silicon)   — firmato
#    Job 2:  Windows MSI               (x64, offline WebView2)   — firmato
#    Job 2b: Windows MSI Lite          (x64, senza WebView2)     — per chi l'ha già
#    Job 3:  Android APK + AAB         (arm64 + armv7)           — firmato
#
#  Sicurezza:
#    - Tutte le GitHub Actions pinnate a SHA completo (40 char)
#    - Permessi GITHUB_TOKEN ridotti al minimo per-job
#    - Nessun permesso a livello workflow (principio del minimo privilegio)
#    - Concurrency control per evitare race condition su release parallele
#    - Timeout espliciti su tutti i job
#    - Keystore Android firmato con certificato dedicato
#    - macOS: codesign Apple via environment variables (tauri-action)
#    - Windows: WiX 4 MSI con offline WebView2 installer + variante lite senza WebView2
#
#  Secrets richiesti (GitHub > Settings > Secrets and variables > Actions):
#    - ANDROID_KEYSTORE_BASE64    Keystore .jks codificato in Base64
#    - ANDROID_STORE_PASSWORD     Password dello store
#    - ANDROID_KEY_ALIAS          Alias della chiave nel keystore
#    - ANDROID_KEY_PASSWORD       Password della chiave
#    (Opzionali per aggiornamenti Tauri):
#    - TAURI_SIGNING_PRIVATE_KEY           Chiave privata per firma Tauri updater
#    - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  Password della chiave Tauri updater
# ═══════════════════════════════════════════════════════════════════════════════

name: "LexFlow Release (macOS + Windows + Android)"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  RUST_BACKTRACE: 1

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  #  JOB 1 — macOS Universal DMG (Intel + Apple Silicon)
  # ─────────────────────────────────────────────────────────────────────────
  build-macos:
    name: "macOS Universal DMG"
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove local cargo config
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: ./src-tauri -> target
          shared-key: macos-universal

      - name: Install frontend dependencies
        run: |
          npm ci
          cd client && npm ci --legacy-peer-deps

      - name: Build and Release macOS DMG
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LexFlow ${{ github.ref_name }}"
          releaseBody: |
            ## LexFlow ${{ github.ref_name }}

            | Piattaforma | Formato | Architettura | Note |
            |-------------|---------|--------------|------|
            | **macOS**   | `.dmg`  | Universal (Intel + Apple Silicon) | |
            | **Windows** | `.msi`  | x64 (offline installer con WebView2) | Per PC senza WebView2 |
            | **Windows** | `.msi` (`-no-webview2`) | x64 (senza WebView2) | Per PC che hanno già WebView2 — installer più leggero |
            | **Android** | `.apk` / `.aab` | arm64-v8a, armeabi-v7a | |
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin --bundles dmg

  # ─────────────────────────────────────────────────────────────────────────
  #  JOB 2 — Windows MSI (x64) — Offline WebView2, WiX 4
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: "Windows MSI (x64)"
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove local cargo config
        shell: powershell
        run: |
          if (Test-Path "src-tauri/.cargo/config.toml") {
            Remove-Item "src-tauri/.cargo/config.toml" -Force
          }

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: ./src-tauri -> target
          shared-key: windows-x64

      - name: Install WiX Toolset 4
        shell: powershell
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5 -g

      - name: Write WebView2 config override
        shell: powershell
        run: |
          $json = '{"bundle":{"windows":{"webviewInstallMode":{"type":"offlineInstaller","silent":true}}}}'
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$PWD\src-tauri\tauri.webview2.conf.json", $json, $utf8NoBom)
          Write-Host "Config override written:"
          Get-Content "$PWD\src-tauri\tauri.webview2.conf.json"

      - name: Install frontend dependencies
        run: |
          npm ci
          cd client && npm ci --legacy-peer-deps

      - name: Build and Release Windows MSI (with WebView2)
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "8"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LexFlow ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc --bundles msi --config src-tauri/tauri.webview2.conf.json

  # ─────────────────────────────────────────────────────────────────────────
  #  JOB 2b — Windows MSI Lite (x64) — SENZA WebView2 (per chi ce l'ha già)
  #  Completamente offline — nessun download richiesto all'utente
  # ─────────────────────────────────────────────────────────────────────────
  build-windows-lite:
    name: "Windows MSI Lite (x64, no WebView2)"
    runs-on: windows-latest
    needs: build-windows
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove local cargo config
        shell: powershell
        run: |
          if (Test-Path "src-tauri/.cargo/config.toml") {
            Remove-Item "src-tauri/.cargo/config.toml" -Force
          }

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: ./src-tauri -> target
          shared-key: windows-x64-lite

      - name: Install WiX Toolset 4
        shell: powershell
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5 -g

      - name: Install frontend dependencies
        run: |
          npm ci
          cd client && npm ci --legacy-peer-deps

      - name: Build Windows MSI Lite (no WebView2)
        shell: powershell
        run: npx tauri build --target x86_64-pc-windows-msvc --bundles msi

      - name: Rename and Upload lite MSI
        shell: powershell
        run: |
          $msiFiles = Get-ChildItem -Recurse -Filter "*.msi" -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi"
          foreach ($msi in $msiFiles) {
            $newName = $msi.Name -replace '\.msi$', '-no-webview2.msi'
            $newPath = Join-Path $msi.DirectoryName $newName
            Rename-Item $msi.FullName $newName
            Write-Host "Renamed: $($msi.Name) -> $newName"
            gh release upload "${{ github.ref_name }}" "$newPath" --clobber
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  #  JOB 3 — Android APK + AAB (arm64 + armv7) — Firmato
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: "Android APK + AAB"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove local cargo config
        run: rm -f src-tauri/.cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Setup Android NDK
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1.6.0
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: ./src-tauri -> target
          shared-key: android

      - name: Install frontend dependencies
        run: |
          npm ci
          cd client && npm ci --legacy-peer-deps

      - name: Initialize Tauri Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Generate LexFlow Android icons
        run: |
          pip3 install --quiet Pillow
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          from pathlib import Path

          master = Image.open("assets/icon-master.png").convert("RGBA")
          res_dir = Path("src-tauri/gen/android/app/src/main/res")

          sizes = {
              "mipmap-mdpi": 48,
              "mipmap-hdpi": 72,
              "mipmap-xhdpi": 96,
              "mipmap-xxhdpi": 144,
              "mipmap-xxxhdpi": 192,
          }

          def resize(img, size):
              return img.resize((size, size), Image.LANCZOS)

          def make_rounded(img, size):
              img = resize(img, size)
              radius = int(size * 0.22)
              mask = Image.new("L", (size, size), 0)
              draw = ImageDraw.Draw(mask)
              draw.rounded_rectangle([(0, 0), (size - 1, size - 1)], radius=radius, fill=255)
              result = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              result.paste(img, (0, 0), mask)
              return result

          for dpi, size in sizes.items():
              d = res_dir / dpi
              d.mkdir(parents=True, exist_ok=True)
              resize(master, size).save(d / "ic_launcher.png")
              resize(master, size).save(d / "ic_launcher_foreground.png")
              make_rounded(master, size).save(d / "ic_launcher_round.png")
              print(f"  ok {dpi} ({size}x{size})")

          print("LexFlow icons applied")
          PYEOF

      - name: Configure Gradle for CI
        run: |
          {
            echo ""
            echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m"
            echo "org.gradle.daemon=false"
            echo "org.gradle.parallel=true"
            echo "org.gradle.caching=true"
          } >> src-tauri/gen/android/gradle.properties

      - name: Pre-download Gradle distribution
        working-directory: src-tauri/gen/android
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i downloading Gradle..."
            ./gradlew --version && break
            echo "Failed, retrying in 15s..."
            sleep 15
          done

      - name: Decode Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p src-tauri/gen/android/app/
            echo "$KEYSTORE_BASE64" | base64 --decode > src-tauri/gen/android/app/release.keystore
            echo "Keystore decoded"
          else
            echo "No keystore found, build will be unsigned"
          fi

      - name: Inject release signing into Gradle
        run: |
          GRADLE_FILE="src-tauri/gen/android/app/build.gradle.kts"
          KEYSTORE_FILE="src-tauri/gen/android/app/release.keystore"
          if [ -f "$KEYSTORE_FILE" ] && [ -f "$GRADLE_FILE" ]; then
            python3 << 'PYEOF'
          import pathlib
          gradle = pathlib.Path("src-tauri/gen/android/app/build.gradle.kts")
          content = gradle.read_text()
          signing_config = '\n    signingConfigs {\n        create("release") {\n            storeFile = file("release.keystore")\n            storePassword = System.getenv("ANDROID_STORE_PASSWORD") ?: ""\n            keyAlias = System.getenv("ANDROID_KEY_ALIAS") ?: ""\n            keyPassword = System.getenv("ANDROID_KEY_PASSWORD") ?: ""\n        }\n    }\n\n'
          content = content.replace("buildTypes {", signing_config + "    buildTypes {", 1)
          content = content.replace('getByName("release") {', 'getByName("release") {\n                signingConfig = signingConfigs.getByName("release")', 1)
          gradle.write_text(content)
          print("Gradle signing configured")
          PYEOF
            grep -A 5 "signingConfigs\|signingConfig" "$GRADLE_FILE" || true
          else
            echo "Keystore or build.gradle.kts not found, skipping signing"
          fi

      - name: Build Android APK and AAB
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "8"
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npx tauri android build

      - name: Professional APK signing (zipalign + apksigner v1-v4)
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          # Locate build tools
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME/build-tools/"* 2>/dev/null | sort -V | tail -1)
          if [ -z "$BUILD_TOOLS" ]; then
            echo "::error::Android build-tools not found"
            exit 1
          fi
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          APKSIGNER="$BUILD_TOOLS/apksigner"
          echo "Using build-tools: $BUILD_TOOLS"

          # Find the Gradle-signed APK
          APK_ORIG=$(find src-tauri/gen/android/app/build/outputs/apk -name "*universal-release.apk" 2>/dev/null | head -1)
          if [ -z "$APK_ORIG" ]; then
            APK_ORIG=$(find src-tauri/gen/android/app/build/outputs/apk -name "*release.apk" ! -name "*unsigned*" 2>/dev/null | head -1)
          fi
          if [ -z "$APK_ORIG" ]; then
            echo "::error::No release APK found after build"
            exit 1
          fi
          echo "Source APK: $APK_ORIG ($(du -h "$APK_ORIG" | cut -f1))"

          # Step 1: Zipalign
          APK_ALIGNED="/tmp/lexflow-aligned.apk"
          "$ZIPALIGN" -f -p 4 "$APK_ORIG" "$APK_ALIGNED"
          "$ZIPALIGN" -c -p 4 "$APK_ALIGNED"
          echo "✅ Zipalign OK"

          # Step 2: Re-sign with apksigner (v1 + v2 + v3 + v4 schemes)
          KEYSTORE="src-tauri/gen/android/app/release.keystore"
          APK_FINAL="/tmp/LexFlow-v${{ github.ref_name != 'main' && github.ref_name || '1.0.0' }}-universal.apk"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-pass "env:ANDROID_STORE_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass "env:ANDROID_KEY_PASSWORD" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --v4-signing-enabled true \
            --out "$APK_FINAL" \
            "$APK_ALIGNED"
          echo "✅ Apksigner sign OK"

          # Step 3: Verify signature
          "$APKSIGNER" verify --verbose --print-certs "$APK_FINAL" 2>&1 | tee /tmp/apk-verify.txt
          if ! grep -q "^Verifies$" /tmp/apk-verify.txt; then
            echo "::error::APK signature verification FAILED"
            exit 1
          fi
          echo "✅ Signature verified"
          echo "APK_FINAL=$APK_FINAL" >> "$GITHUB_ENV"

          # Also process AAB
          AAB_ORIG=$(find src-tauri/gen/android/app/build/outputs/bundle -name "*release.aab" 2>/dev/null | head -1)
          if [ -n "$AAB_ORIG" ]; then
            AAB_FINAL="/tmp/LexFlow-v${{ github.ref_name != 'main' && github.ref_name || '1.0.0' }}-universal.aab"
            cp "$AAB_ORIG" "$AAB_FINAL"
            echo "AAB_FINAL=$AAB_FINAL" >> "$GITHUB_ENV"
          fi

      - name: Upload APK and AAB to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Waiting for release $TAG..."
          for i in $(seq 1 30); do
            gh release view "$TAG" > /dev/null 2>&1 && echo "Release found" && break
            echo "  Attempt $i/30, waiting 15s..."
            sleep 15
          done

          if [ -n "${APK_FINAL:-}" ] && [ -f "$APK_FINAL" ]; then
            echo "Uploading APK: $APK_FINAL ($(du -h "$APK_FINAL" | cut -f1))"
            gh release upload "$TAG" "$APK_FINAL" --clobber
            # Also upload with original name for backwards compatibility
            cp "$APK_FINAL" /tmp/app-universal-release.apk
            gh release upload "$TAG" /tmp/app-universal-release.apk --clobber
            echo "✅ APK uploaded"
          else
            echo "::error::No final APK found"
            exit 1
          fi

          if [ -n "${AAB_FINAL:-}" ] && [ -f "$AAB_FINAL" ]; then
            echo "Uploading AAB: $AAB_FINAL"
            gh release upload "$TAG" "$AAB_FINAL" --clobber
            cp "$AAB_FINAL" /tmp/app-universal-release.aab
            gh release upload "$TAG" /tmp/app-universal-release.aab --clobber
            echo "✅ AAB uploaded"
          fi
