<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!-- SECURITY FIX (Audit 2026-03-14): CSP aligned with tauri.conf.json.
         Removed 'unsafe-inline' from script-src — Tauri v2 auto-generates nonces for
         inline scripts present at build time.  Added object-src/frame-ancestors from
         tauri.conf.json that were missing here.  This meta tag is a fallback if Tauri's
         injected CSP fails to load; it should be equally strict. -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; 
                   script-src 'self'; 
                   style-src 'self' 'unsafe-inline'; 
                   img-src 'self' data: blob:; 
                   font-src 'self' data:; 
                   connect-src ipc: http://ipc.localhost; 
                   object-src 'none';
                   base-uri 'self';
                   form-action 'self';
                   frame-ancestors 'none';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LexFlow</title>
    <!-- ★ Tema istantaneo: applica PRIMA di qualsiasi rendering per evitare flash nero→bianco -->
    <script>
      (function(){
        var t = localStorage.getItem('lexflow-theme');
        if (t === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <style>
      /* Background critico pre-rendering: matcha il tema scelto — DEVE corrispondere a index.css */
      html:not([data-theme="light"]) body { background: #1c1d26; color: #edeef6; }
      html[data-theme="light"] body { background: #d0d1d5; color: #1c1d22; }
      /* Nascondi contenuto finché React non è pronto — evita layout shift */
      #root { opacity: 0; }
      #root.app-mounted { opacity: 1; transition: opacity 0.15s ease; }
    </style>
  </head>
  <body class="antialiased overflow-hidden select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
